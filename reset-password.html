<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CareerCraft AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 14, 39, 0.95);
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            z-index: 100;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: #f1f5f9;
            text-decoration: none;
        }

        .back-btn {
            background: transparent;
            color: #cbd5e1;
            border: none;
            padding: 0.7rem 1.5rem;
            cursor: pointer;
            font-size: 0.95rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: #f1f5f9;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(20, 24, 41, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 1rem;
            padding: 3rem 2rem;
            backdrop-filter: blur(10px);
            margin-top: 6rem;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-align: center;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #cbd5e1;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(10, 14, 39, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 0.5rem;
            color: #f1f5f9;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: rgba(124, 58, 237, 0.5);
            background: rgba(124, 58, 237, 0.05);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        input::placeholder {
            color: #64748b;
        }

        .btn-primary {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(124, 58, 237, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: #fee2e2;
            color: #991b1b;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }

        .success-msg {
            background: #dcfce7;
            color: #166534;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }

        .back-to-login {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: #cbd5e1;
        }

        .back-to-login a {
            color: #7c3aed;
            text-decoration: none;
            font-weight: 600;
        }

        .back-to-login a:hover {
            color: #a855f7;
        }

        /* New password form (shown after reset link clicked) */
        #newPasswordForm {
            display: none;
        }

        .info-box {
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #cbd5e1;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">🚀 CareerCraft</a>
        <a href="login.html" class="back-btn">← Back to Sign In</a>
    </nav>

    <div class="container">
        <!-- Step 1: Request reset email -->
        <div id="requestForm">
            <h1>🔑 Reset Password</h1>
            <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>

            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>

            <form onsubmit="handlePasswordReset(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">Send Reset Link</button>
            </form>

            <p class="back-to-login">
                Remember your password? <a href="login.html">Sign in</a>
            </p>
        </div>

        <!-- Step 2: Set new password (reached via reset link) -->
        <div id="newPasswordForm">
            <h1>🔐 New Password</h1>
            <p class="subtitle">Enter and confirm your new password below.</p>

            <div class="info-box">
                Choose a strong password with at least 8 characters.
            </div>

            <div id="newErrorMsg" class="error-msg"></div>
            <div id="newSuccessMsg" class="success-msg"></div>

            <form onsubmit="handleNewPassword(event)">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="At least 8 characters" required minlength="8">
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat new password" required minlength="8">
                </div>

                <button type="submit" class="btn-primary" id="newSubmitBtn">Update Password</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://eduogxolvpqdtvtdiqav.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdW9neG9sdnBxZHR2dGRpcWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjkzMjksImV4cCI6MjA5MDIwNTMyOX0.MmCTr5qceI2iSCBzs2AcLPhn7_aoKfsoWUoKMUwhPhc';

        const { createClient } = supabase;
        const client = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Detect if this is a password-recovery redirect from Supabase email link
        client.auth.onAuthStateChange((event) => {
            if (event === 'PASSWORD_RECOVERY') {
                document.getElementById('requestForm').style.display = 'none';
                document.getElementById('newPasswordForm').style.display = 'block';
            }
        });

        async function handlePasswordReset(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (!email) {
                errorMsg.textContent = '❌ Please enter your email address.';
                errorMsg.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const { error } = await client.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html'
                });

                if (error) throw new Error(error.message);

                successMsg.textContent = '✅ Reset link sent! Check your email inbox (and spam folder).';
                successMsg.style.display = 'block';
                submitBtn.textContent = 'Email Sent';
            } catch (error) {
                console.error('Reset error:', error);
                errorMsg.textContent = `❌ ${error.message}`;
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        }

        async function handleNewPassword(event) {
            event.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('newSubmitBtn');
            const errorMsg = document.getElementById('newErrorMsg');
            const successMsg = document.getElementById('newSuccessMsg');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (newPassword !== confirmPassword) {
                errorMsg.textContent = '❌ Passwords do not match.';
                errorMsg.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';

            try {
                const { error } = await client.auth.updateUser({ password: newPassword });

                if (error) throw new Error(error.message);

                successMsg.textContent = '✅ Password updated! Redirecting to sign in...';
                successMsg.style.display = 'block';

                await client.auth.signOut();
                localStorage.removeItem('userEmail');
                localStorage.removeItem('userName');
                localStorage.removeItem('userId');
                localStorage.removeItem('userToken');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                console.error('Update password error:', error);
                errorMsg.textContent = `❌ ${error.message}`;
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Password';
            }
        }
    </script>
</body>
</html>
