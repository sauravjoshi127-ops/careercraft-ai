<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CareerCraft AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles/premium.css">
    <style>
        .container {
            width: 100%;
            max-width: 420px;
            margin: 6rem auto 4rem;
            position: relative;
            z-index: 10;
        }
        .container h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: var(--text-2);
            margin-bottom: 2rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .error-msg, .success-msg {
            padding: 0.875rem 1rem;
            border-radius: var(--r-sm);
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.88rem;
            font-weight: 500;
        }
        .error-msg { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
        .success-msg { background: rgba(16,185,129,0.1); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }
        
        .back-to-login {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.88rem;
            color: var(--text-2);
        }
        .back-to-login a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .back-to-login a:hover {
            color: var(--accent-hover);
        }
        .info-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            padding: 0.875rem 1.125rem;
            margin-bottom: 1.5rem;
            font-size: 0.88rem;
            color: var(--text-2);
            line-height: 1.5;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="topnav">
        <a href="index.html" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            CareerCraft AI
        </a>
        <a href="login.html" class="btn-primary" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.5rem 1rem;">← Back to Sign In</a>
    </nav>

    <div class="container">
        <!-- Step 1: Request reset email -->
        <div id="requestForm">
            <h1>🔑 Reset Password</h1>
            <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>

            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>

            <form onsubmit="handlePasswordReset(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">Send Reset Link</button>
            </form>

            <p class="back-to-login">
                Remember your password? <a href="login.html">Sign in</a>
            </p>
        </div>

        <!-- Step 2: Set new password (reached via reset link) -->
        <div id="newPasswordForm">
            <h1>🔐 New Password</h1>
            <p class="subtitle">Enter and confirm your new password below.</p>

            <div class="info-box">
                Choose a strong password with at least 8 characters.
            </div>

            <div id="newErrorMsg" class="error-msg"></div>
            <div id="newSuccessMsg" class="success-msg"></div>

            <form onsubmit="handleNewPassword(event)">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="At least 8 characters" required minlength="8">
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat new password" required minlength="8">
                </div>

                <button type="submit" class="btn-primary" id="newSubmitBtn">Update Password</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://eduogxolvpqdtvtdiqav.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdW9neG9sdnBxZHR2dGRpcWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjkzMjksImV4cCI6MjA5MDIwNTMyOX0.MmCTr5qceI2iSCBzs2AcLPhn7_aoKfsoWUoKMUwhPhc';

        const { createClient } = supabase;
        const client = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Detect if this is a password-recovery redirect from Supabase email link
        client.auth.onAuthStateChange((event) => {
            if (event === 'PASSWORD_RECOVERY') {
                document.getElementById('requestForm').style.display = 'none';
                document.getElementById('newPasswordForm').style.display = 'block';
            }
        });

        async function handlePasswordReset(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (!email) {
                errorMsg.textContent = '❌ Please enter your email address.';
                errorMsg.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const { error } = await client.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html'
                });

                if (error) throw new Error(error.message);

                successMsg.textContent = '✅ Reset link sent! Check your email inbox (and spam folder).';
                successMsg.style.display = 'block';
                submitBtn.textContent = 'Email Sent';
            } catch (error) {
                console.error('Reset error:', error);
                errorMsg.textContent = `❌ ${error.message}`;
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        }

        async function handleNewPassword(event) {
            event.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('newSubmitBtn');
            const errorMsg = document.getElementById('newErrorMsg');
            const successMsg = document.getElementById('newSuccessMsg');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (newPassword !== confirmPassword) {
                errorMsg.textContent = '❌ Passwords do not match.';
                errorMsg.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';

            try {
                const { error } = await client.auth.updateUser({ password: newPassword });

                if (error) throw new Error(error.message);

                successMsg.textContent = '✅ Password updated! Redirecting to sign in...';
                successMsg.style.display = 'block';

                await client.auth.signOut();
                localStorage.removeItem('userEmail');
                localStorage.removeItem('userName');
                localStorage.removeItem('userId');
                localStorage.removeItem('userToken');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                console.error('Update password error:', error);
                errorMsg.textContent = `❌ ${error.message}`;
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Password';
            }
        }
    </script>
</body>
</html>
