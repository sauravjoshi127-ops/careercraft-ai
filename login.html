<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - CareerCraft AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 14, 39, 0.95);
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            z-index: 100;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: #f1f5f9;
            text-decoration: none;
        }

        .back-btn {
            background: transparent;
            color: #cbd5e1;
            border: none;
            padding: 0.7rem 1.5rem;
            cursor: pointer;
            font-size: 0.95rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: #f1f5f9;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(20, 24, 41, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 1rem;
            padding: 3rem 2rem;
            backdrop-filter: blur(10px);
            margin-top: 6rem;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-align: center;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #cbd5e1;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(10, 14, 39, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 0.5rem;
            color: #f1f5f9;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: rgba(124, 58, 237, 0.5);
            background: rgba(124, 58, 237, 0.05);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        input::placeholder {
            color: #64748b;
        }

        .remember {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .remember a {
            color: #7c3aed;
            text-decoration: none;
        }

        .btn-signin {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(124, 58, 237, 0.3);
        }

        .btn-signin:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            color: #64748b;
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(148, 163, 184, 0.1);
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        .social-signin {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .social-btn {
            flex: 1;
            padding: 0.85rem;
            background: rgba(10, 14, 39, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.15);
            color: #f1f5f9;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .social-btn:hover {
            border-color: rgba(124, 58, 237, 0.3);
            background: rgba(124, 58, 237, 0.05);
        }

        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: #cbd5e1;
        }

        .signup-link a {
            color: #7c3aed;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            color: #a855f7;
        }

        .error-msg {
            background: #fee2e2;
            color: #991b1b;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }

        .success-msg {
            background: #dcfce7;
            color: #166534;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">🚀 CareerCraft</a>
        <a href="index.html" class="back-btn">← Back to Home</a>
    </nav>

    <div class="container">
        <h1>Sign In</h1>
        <p class="subtitle">Welcome back! Sign in to your account.</p>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="remember">
                <label>
                    <input type="checkbox" style="width: auto;"> Remember me
                </label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn-signin" id="submitBtn">Sign In</button>
        </form>

        <div class="divider">Or continue with</div>

        <div class="social-signin">
            <button class="social-btn" type="button">Google</button>
            <button class="social-btn" type="button">GitHub</button>
        </div>

        <p class="signup-link">
            Don't have an account? <a href="signup.html">Sign up free</a>
        </p>
    </div>

    <script>
        // Initialize Supabase with YOUR keys
        const SUPABASE_URL = 'https://eduogxolvpqdtvtdiqav.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdW9neG9sdnBxZHR2dGRpcWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjkzMjksImV4cCI6MjA5MDIwNTMyOX0.MmCTr5qceI2iSCBzs2AcLPhn7_aoKfsoWUoKMUwhPhc';

        const { createClient } = supabase;
        const client = createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            // Reset messages
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            try {
                console.log('Attempting login with:', email);

                // ✅ Use Supabase Auth to sign in
                const { data, error } = await client.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                console.log('Auth response:', { data, error });

                if (error) {
                    throw new Error(error.message);
                }

                if (!data.user) {
                    throw new Error('No user returned from authentication');
                }

                // Get user info from users table
                const { data: userData, error: userError } = await client
                    .from('users')
                    .select('full_name')
                    .eq('email', email)
                    .single();

                console.log('User data:', { userData, userError });

                // Success!
                successMsg.textContent = '✅ Signed in successfully! Redirecting...';
                successMsg.style.display = 'block';

                // Store in localStorage
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userName', userData?.full_name || email.split('@')[0]);
                localStorage.setItem('userId', data.user.id);
                localStorage.setItem('userToken', data.session.access_token);

                console.log('Login successful, redirecting...');

                // Redirect after 1 second
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = `❌ Error: ${error.message}`;
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        }
    </script>
</body>
</html>
