<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - CareerCraft AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/premium.css">
    <style>
        .auth-wrapper {
            width: 100%;
            max-width: 420px;
            margin: 6rem auto 4rem;
            display: none;
            position: relative;
            z-index: 10;
        }
        .auth-wrapper.show {
            display: block;
            animation: fadeInUp 0.5s ease-out forwards;
        }
        .auth-wrapper h1 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            text-align: center;
            color: var(--text-2);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .remember {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.88rem;
            color: var(--text-2);
        }
        .remember a {
            color: var(--text-1);
            text-decoration: none;
            font-weight: 500;
        }
        .remember a:hover {
            color: var(--accent);
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: var(--text-3);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .divider::before { margin-right: 1rem; }
        .divider::after { margin-left: 1rem; }
        .social-login {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .social-btn {
            flex: 1;
            padding: 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            color: var(--text-1);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 500;
            transition: all var(--t-fast);
        }
        .social-btn:hover {
            background: var(--bg-hover);
            border-color: var(--border-hover);
        }
        .auth-link {
            text-align: center;
            color: var(--text-2);
            font-size: 0.88rem;
            margin-top: 1.5rem;
        }
        .auth-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-link a:hover {
            color: var(--accent-hover);
        }
        .error-msg, .success-msg {
            padding: 0.875rem 1rem;
            border-radius: var(--r-sm);
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.88rem;
            font-weight: 500;
        }
        .error-msg { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
        .success-msg { background: rgba(16,185,129,0.1); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }
    </style>
</head>
<body>



    <nav class="topnav">
        <a href="index.html" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            CareerCraft AI
        </a>
        <a href="index.html" class="btn-primary" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.5rem 1rem;">← Back to Home</a>
    </nav>

    <div class="auth-wrapper glass-card" id="authWrapper">
        <h1>Sign In</h1>
        <p class="subtitle">Welcome back! Sign in to your account.</p>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="remember">
                <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: 400;">
                    <input type="checkbox" style="width: auto;"> Remember me
                </label>
                <a href="reset-password.html">Forgot password?</a>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn" style="width: 100%; padding: 0.95rem;">Sign In</button>
        </form>

        <div class="divider">Or continue with</div>

        <div class="social-login">
            <button class="social-btn" type="button">Google</button>
            <button class="social-btn" type="button">GitHub</button>
        </div>

        <p class="auth-link">
            Don't have an account? <a href="signup.html">Sign up free</a>
        </p>
    </div>

    <script>
        // Initialize Supabase with YOUR keys
        const SUPABASE_URL = 'https://eduogxolvpqdtvtdiqav.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdW9neG9sdnBxZHR2dGRpcWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjkzMjksImV4cCI6MjA5MDIwNTMyOX0.MmCTr5qceI2iSCBzs2AcLPhn7_aoKfsoWUoKMUwhPhc';

        const client = window.supabase && typeof window.supabase.createClient === 'function'
            ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
            : null;

        function showMessage(node, message) {
            node.textContent = message;
            node.style.display = 'block';
        }

        function getFriendlyAuthError(error) {
            const message = String(error?.message || error || '').trim();
            const lower = message.toLowerCase();

            if (!client) {
                return 'Sign in service could not load. Please refresh the page or check your internet connection.';
            }

            if (!navigator.onLine || lower.includes('failed to fetch') || lower.includes('networkerror') || lower.includes('load failed')) {
                return 'We could not reach the sign in service. Please check your internet connection and try again.';
            }

            if (lower.includes('invalid login credentials')) {
                return 'Invalid email or password. Please try again.';
            }

            if (lower.includes('email not confirmed')) {
                return 'Please verify your email before signing in.';
            }

            return message || 'Unable to sign in right now. Please try again.';
        }

        // Redirect if already logged in (hidden initially to prevent FOUC glitch)
        async function checkExistingSession() {
            if (!client) {
                document.getElementById('authWrapper').classList.add('show');
                return;
            }
            const { data: { session } } = await client.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('authWrapper').classList.add('show');
            }
        }
        checkExistingSession();

        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            // Reset messages
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (!email || !password) {
                showMessage(errorMsg, 'Please enter your email and password.');
                return;
            }

            if (!client) {
                showMessage(errorMsg, getFriendlyAuthError());
                return;
            }

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            try {
                // ✅ Use Supabase Auth to sign in (session persisted automatically)
                const { data, error } = await client.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    throw new Error(error.message);
                }

                if (!data.user) {
                    throw new Error('No user returned from authentication');
                }

                const name = data.user.user_metadata?.full_name || email.split('@')[0];

                // Success! Keep localStorage in sync for fallback
                showMessage(successMsg, 'Signed in successfully. Redirecting...');

                localStorage.setItem('userEmail', email);
                localStorage.setItem('userName', name);
                localStorage.setItem('userId', data.user.id);
                localStorage.setItem('userToken', data.session.access_token);

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                let message = getFriendlyAuthError(error);
                if (message.includes('Invalid login credentials')) {
                    message = 'Invalid email or password. Please try again.';
                } else if (message.includes('Email not confirmed')) {
                    message = 'Please verify your email before signing in.';
                }
                showMessage(errorMsg, message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        }
    </script>
<script src="ambient3d.js"></script>
<script src="wow-effects.js"></script>
</body>
</html>
