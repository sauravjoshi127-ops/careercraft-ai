<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CareerCraft AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(20, 24, 41, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 1rem;
            padding: 3rem 2rem;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-align: center;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #cbd5e1;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(10, 14, 39, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 0.5rem;
            color: #f1f5f9;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: rgba(124, 58, 237, 0.5);
            background: rgba(124, 58, 237, 0.05);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        input::placeholder {
            color: #64748b;
        }

        .terms {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            margin: 2rem 0;
            font-size: 0.85rem;
        }

        .terms input {
            width: auto;
            margin-top: 0.35rem;
        }

        .terms label {
            margin: 0;
            font-weight: 400;
            line-height: 1.5;
        }

        .terms a {
            color: #7c3aed;
            text-decoration: none;
            transition: color 0.3s;
        }

        .terms a:hover {
            color: #a855f7;
        }

        .btn-signup {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(124, 58, 237, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            color: #64748b;
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(148, 163, 184, 0.1);
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        .social-signup {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .social-btn {
            flex: 1;
            padding: 0.85rem;
            background: rgba(10, 14, 39, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.15);
            color: #f1f5f9;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .social-btn:hover {
            border-color: rgba(124, 58, 237, 0.3);
            background: rgba(124, 58, 237, 0.05);
        }

        .signin-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: #cbd5e1;
        }

        .signin-link a {
            color: #7c3aed;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .signin-link a:hover {
            color: #a855f7;
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚀 CareerCraft</div>
        <h1>Create Account</h1>
        <p class="subtitle">Join 500+ students landing their dream jobs.</p>

        <form onsubmit="handleSignup(event)">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Your name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="At least 8 characters" required>
            </div>

            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" placeholder="Confirm password" required>
            </div>

            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">
                    I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" class="btn-signup">Create Account</button>
        </form>

        <div class="divider">Or sign up with</div>

        <div class="social-signup">
            <button class="social-btn">Google</button>
            <button class="social-btn">GitHub</button>
        </div>

        <p class="signin-link">
            Already have an account? <a href="login.html">Sign in</a>
        </p>
    </div>

    <script>
        function handleSignup(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            alert(`Welcome ${name}! Account created. Redirecting to dashboard...`);
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
