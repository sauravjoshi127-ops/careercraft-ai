<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CareerCraft AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/premium.css">
    <style>
        .auth-wrapper {
            width: 100%;
            max-width: 420px;
            margin: 6rem auto 4rem;
            display: none;
            position: relative;
            z-index: 10;
        }
        .auth-wrapper.show {
            display: block;
            animation: fadeInUp 0.5s ease-out forwards;
        }
        .auth-wrapper h1 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            text-align: center;
            color: var(--text-2);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .terms {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            margin: 1.5rem 0;
            font-size: 0.85rem;
            color: var(--text-2);
        }
        .terms input {
            width: auto;
            margin-top: 0.2rem;
        }
        .terms a {
            color: var(--text-1);
            text-decoration: none;
            font-weight: 500;
        }
        .terms a:hover {
            color: var(--accent);
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: var(--text-3);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .divider::before { margin-right: 1rem; }
        .divider::after { margin-left: 1rem; }
        .social-login {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .social-btn {
            flex: 1;
            padding: 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            color: var(--text-1);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 500;
            transition: all var(--t-fast);
        }
        .social-btn:hover {
            background: var(--bg-hover);
            border-color: var(--border-hover);
        }
        .auth-link {
            text-align: center;
            color: var(--text-2);
            font-size: 0.88rem;
            margin-top: 1.5rem;
        }
        .auth-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-link a:hover {
            color: var(--accent-hover);
        }
        .error-msg, .success-msg {
            padding: 0.875rem 1rem;
            border-radius: var(--r-sm);
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.88rem;
            font-weight: 500;
        }
        .error-msg { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
        .success-msg { background: rgba(16,185,129,0.1); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }
    </style>
</head>
<body>



    <nav class="topnav">
        <a href="index.html" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            CareerCraft AI
        </a>
        <a href="index.html" class="btn-primary" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.5rem 1rem;">← Back to Home</a>
    </nav>

    <div class="auth-wrapper glass-card" id="authWrapper">
        <h1>Create Account</h1>
        <p class="subtitle">Join 500+ students landing their dream jobs.</p>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Your name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="At least 8 characters" required minlength="8">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm password" required>
            </div>

            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label for="terms" style="margin: 0; line-height: 1.4;">
                    I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn" style="width: 100%; padding: 0.95rem;">Create Account</button>
        </form>

        <div class="divider">Or sign up with</div>

        <div class="social-login">
            <button class="social-btn" type="button">Google</button>
            <button class="social-btn" type="button">GitHub</button>
        </div>

        <p class="auth-link">
            Already have an account? <a href="login.html">Sign in</a>
        </p>
    </div>

    <script>
        // Initialize Supabase with YOUR keys
        const SUPABASE_URL = 'https://eduogxolvpqdtvtdiqav.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdW9neG9sdnBxZHR2dGRpcWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjkzMjksImV4cCI6MjA5MDIwNTMyOX0.MmCTr5qceI2iSCBzs2AcLPhn7_aoKfsoWUoKMUwhPhc';

        const { createClient } = supabase;
        const client = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Redirect if already logged in (hidden initially to prevent FOUC glitch)
        async function checkExistingSession() {
            if (!client) {
                document.getElementById('authWrapper').classList.add('show');
                return;
            }
            const { data: { session } } = await client.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('authWrapper').classList.add('show');
            }
        }
        checkExistingSession();

        async function handleSignup(event) {
            event.preventDefault();

            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            // Reset messages
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // Validate passwords match
            if (password !== confirmPassword) {
                errorMsg.textContent = '❌ Passwords do not match!';
                errorMsg.style.display = 'block';
                return;
            }

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';

            try {
                console.log('Step 1: Signing up with Supabase Auth...');

                // ✅ Create auth user in Supabase Auth system
                const { data: authData, error: authError } = await client.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName
                        }
                    }
                });

                console.log('Auth signup response:', { authData, authError });

                if (authError) {
                    throw new Error(`Auth Error: ${authError.message}`);
                }

                if (!authData.user) {
                    throw new Error('No user returned from auth signup');
                }

                console.log('Step 2: User created in Auth:', authData.user.id);
                console.log('Step 3: Saving user to database...');

                // ✅ Store user profile in users table
                const { error: dbError } = await client
                    .from('users')
                    .insert([
                        {
                            email: email,
                            full_name: fullName
                        }
                    ]);

                if (dbError) {
                    console.warn('Database insert warning:', dbError);
                    // Don't throw - auth user is already created
                }

                console.log('Step 4: Success! User saved to database');

                // Success!
                successMsg.textContent = '✅ Account created successfully! Redirecting to dashboard...';
                successMsg.style.display = 'block';

                // Store email in localStorage for dashboard
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userName', fullName);
                localStorage.setItem('userId', authData.user.id);

                console.log('Redirecting to dashboard...');

                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);

            } catch (error) {
                console.error('Signup error:', error);
                errorMsg.textContent = `❌ Error: ${error.message}`;
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        }
    </script>
<script src="ambient3d.js"></script>
<script src="wow-effects.js"></script>
</body>
</html>
