<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CareerCraft AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app-sdk.js"></script>
    <script src="layout-manager.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .auth-wrapper {
            width: 100%;
            max-width: 420px;
            margin: 6rem auto 4rem;
            display: none;
            position: relative;
            z-index: 10;
        }
        .auth-wrapper.show {
            display: block;
            animation: fadeInUp 0.5s ease-out forwards;
        }
        .auth-wrapper h1 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            text-align: center;
            color: var(--text-2);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .terms {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            margin: 1.5rem 0;
            font-size: 0.85rem;
            color: var(--text-2);
        }
        .terms input {
            width: auto;
            margin-top: 0.2rem;
        }
        .terms a {
            color: var(--text-1);
            text-decoration: none;
            font-weight: 500;
        }
        .terms a:hover {
            color: var(--accent);
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: var(--text-3);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .divider::before { margin-right: 1rem; }
        .divider::after { margin-left: 1rem; }
        .social-login {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .social-btn {
            flex: 1;
            padding: 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            color: var(--text-1);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 500;
            transition: all var(--t-fast);
        }
        .social-btn:hover {
            background: var(--bg-hover);
            border-color: var(--border-hover);
        }
        .auth-link {
            text-align: center;
            color: var(--text-2);
            font-size: 0.88rem;
            margin-top: 1.5rem;
        }
        .auth-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-link a:hover {
            color: var(--accent-hover);
        }
        .error-msg, .success-msg {
            padding: 0.875rem 1rem;
            border-radius: var(--r-sm);
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.88rem;
            font-weight: 500;
        }
        .error-msg { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
        .success-msg { background: rgba(16,185,129,0.1); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }
    </style>
    <link rel="stylesheet" href="styles/premium.css">
</head>
<body>



    <!-- Top Navigation — rendered by NavigationManager -->
    <nav class="ch-nav" aria-label="Main navigation"></nav>

    <div class="auth-wrapper glass-card" id="authWrapper">
        <h1>Create Account</h1>
        <p class="subtitle">Join 500+ students landing their dream jobs.</p>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Your name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="At least 8 characters" required minlength="8">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm password" required>
            </div>

            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label for="terms" style="margin: 0; line-height: 1.4;">
                    I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn" style="width: 100%; padding: 0.95rem;">Create Account</button>
        </form>

        <div class="divider">Or sign up with</div>

        <div class="social-login">
            <button class="social-btn" type="button">Google</button>
            <button class="social-btn" type="button">GitHub</button>
        </div>

        <p class="auth-link">
            Already have an account? <a href="login.html">Sign in</a>
        </p>
    </div>

    <script>
        // Use unified Client SDK
        let client = null;

        // Redirect if already logged in (hidden initially to prevent FOUC glitch)
        function showVerificationScreen(email) {
            document.getElementById('signupForm').style.display = 'none';
            const divider = document.querySelector('.divider');
            if (divider) divider.style.display = 'none';
            const socialLogin = document.querySelector('.social-login');
            if (socialLogin) socialLogin.style.display = 'none';
            const authLink = document.querySelector('.auth-link');
            if (authLink) authLink.style.display = 'none';

            document.querySelector('h1').textContent = 'Verify Your Email';
            document.querySelector('.subtitle').textContent = `Verification link sent.`;

            const successMsg = document.getElementById('successMsg');
            successMsg.innerHTML = `
                <div style="text-align: center; padding: 1rem 0;">
                    <svg class="icon-svg" viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display:block; margin: 0 auto 1rem; color:var(--cyan);"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <h3 style="color: #6ee7b7; margin-bottom: 0.5rem; font-size: 1.1rem; font-weight: 700;">Check Your Inbox</h3>
                    <p style="color: var(--text-2); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5;">
                        We've sent a verification link to <strong>${email}</strong>.<br>Please click the link to activate your account.
                    </p>
                    <button class="btn-primary" type="button" onclick="clearVerificationAndGoToLogin()" style="padding: 0.65rem 1.25rem; font-size: 0.85rem; width: auto; display: inline-block;">Proceed to Login</button>
                </div>
            `;
            successMsg.style.display = 'block';
            document.getElementById('authWrapper').classList.add('show');
        }

        function clearVerificationAndGoToLogin() {
            sessionStorage.removeItem('signup_verification_required');
            window.location.href = 'login.html';
        }

        // Redirect if already logged in (hidden initially to prevent FOUC glitch)
        async function checkExistingSession() {
            await window.appSdk.ready;
            client = window.appSdk.client;
            
            const verificationEmail = sessionStorage.getItem('signup_verification_required');
            if (verificationEmail) {
                showVerificationScreen(verificationEmail);
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const hasError = urlParams.has('error') || urlParams.has('loop');

            try {
                const session = await window.appSdk.auth.getSession();
                if (session && !hasError) {
                    window.location.href = 'dashboard.html';
                } else {
                    if (hasError && session && window.appSdk.client) {
                        console.warn('Redirect loop detected. Clearing session.');
                        await window.appSdk.client.auth.signOut().catch(() => {});
                        localStorage.clear();
                    }
                    document.getElementById('authWrapper').classList.add('show');
                }
            } catch (err) {
                console.error('Session check error:', err);
                document.getElementById('authWrapper').classList.add('show');
            }
        }
        checkExistingSession();

        function getFriendlySignUpError(error) {
            const message = String(error?.message || error || '').trim();
            const lower = message.toLowerCase();

            if (!client) {
                return 'Sign up service could not load. Please refresh the page or check your internet connection.';
            }

            if (!navigator.onLine || lower.includes('failed to fetch') || lower.includes('networkerror') || lower.includes('load failed')) {
                return 'We could not reach the sign up service. Please check your internet connection and try again.';
            }

            if (lower.includes('already registered') || lower.includes('email already in use') || lower.includes('user already exists')) {
                return 'This email address is already registered. Please sign in instead.';
            }

            if (lower.includes('password should be') || lower.includes('weak password')) {
                return 'Your password is too weak. Please use at least 8 characters with a mix of letters and numbers.';
            }

            if (lower.includes('invalid email') || lower.includes('unable to validate email')) {
                return 'Please enter a valid email address.';
            }

            return message || 'Unable to create account right now. Please try again.';
        }

        async function handleSignup(event) {
            event.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            // Reset messages
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // Validate passwords match
            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match!';
                errorMsg.style.display = 'block';
                return;
            }

            if (!client) {
                errorMsg.textContent = 'Authentication service is offline. Please try again.';
                errorMsg.style.display = 'block';
                return;
            }

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';

            try {
                console.log('Step 1: Signing up with Supabase Auth...');

                // ✅ Create auth user in Supabase Auth system
                const { data: authData, error: authError } = await client.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName
                        }
                    }
                });

                console.log('Auth signup response:', { authData, authError });

                if (authError) {
                    throw new Error(authError.message);
                }

                if (!authData.user) {
                    throw new Error('No user returned from sign up.');
                }

                // Check if email already registered (identities check in Supabase)
                const isExistingUser = authData.user.identities && authData.user.identities.length === 0;
                if (isExistingUser) {
                    throw new Error('This email address is already registered. Please sign in instead.');
                }

                console.log('Step 2: User created in Auth:', authData.user.id);
                console.log('Step 3: Saving user to database...');

                // ✅ Store user profile in users table (optional fallback, db trigger handles it in production)
                const { error: dbError } = await client
                    .from('users')
                    .insert([
                        {
                            email: email,
                            full_name: fullName
                        }
                    ]);

                if (dbError) {
                    console.warn('Database insert warning:', dbError);
                }

                console.log('Step 4: Success! checking session...');

                // Case A: Email verification required
                if (!authData.session) {
                    sessionStorage.setItem('signup_verification_required', email);
                    showVerificationScreen(email);
                    return;
                }

                // Case B: Auto-login session established
                successMsg.textContent = 'Account created successfully! Redirecting to dashboard...';
                successMsg.style.display = 'block';

                // Keep localStorage in sync for dashboard fallback
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userName', fullName);
                localStorage.setItem('userId', authData.user.id);
                localStorage.setItem('userToken', authData.session.access_token);

                console.log('Redirecting to dashboard...');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (error) {
                console.error('Signup error:', error);
                errorMsg.textContent = `Error: ${getFriendlySignUpError(error)}`;
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        }
    </script>
</body>
