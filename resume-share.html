<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Resume - CareerCraft AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #f1f5f9;
            min-height: 100vh;
        }

        /* Top bar */
        .topbar {
            background: rgba(10, 14, 39, 0.95);
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .topbar-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.35);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: #cbd5e1;
        }

        .btn-secondary:hover {
            border-color: #7c3aed;
            color: #7c3aed;
        }

        /* Content wrapper */
        .page-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Loading / error states */
        .status-card {
            background: rgba(20, 24, 41, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 1rem;
            padding: 3rem 2rem;
            text-align: center;
            margin-top: 2rem;
        }

        .status-icon { font-size: 3rem; margin-bottom: 1rem; }

        .status-card h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .status-card p { color: #94a3b8; line-height: 1.6; }

        /* Resume wrapper */
        #resumeWrapper {
            background: white;
            border-radius: 0.75rem;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            margin-top: 1.5rem;
        }

        /* Meta bar above resume */
        .resume-meta-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .meta-info { color: #94a3b8; font-size: 0.875rem; }
        .meta-info strong { color: #f1f5f9; }

        @media (max-width: 640px) {
            .topbar { flex-direction: column; gap: 0.5rem; padding: 1rem; }
            .page-content { padding: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="topbar">
        <div class="logo">📝 CareerCraft AI</div>
        <div class="topbar-actions">
            <button class="btn btn-primary" id="downloadBtn" onclick="triggerPDF()" style="display:none;">📥 Download PDF</button>
            <a href="index.html" class="btn btn-secondary">🏠 Home</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="page-content">
        <div id="statusContainer">
            <div class="status-card">
                <div class="status-icon">⏳</div>
                <h2>Loading Resume…</h2>
                <p>Fetching resume data, please wait.</p>
            </div>
        </div>

        <div id="resumeContainer" style="display:none;">
            <div class="resume-meta-bar">
                <div class="meta-info">
                    Viewing resume of <strong id="resumeOwnerName"></strong>
                </div>
            </div>
            <div id="resumeWrapper"></div>
        </div>
    </div>

    <script>
        // ── Supabase Setup ────────────────────────────────────────────────────────
        const SUPABASE_URL = 'https://eduogxolvpqdtvtdiqav.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdW9neG9sdnBxZHR2dGRpcWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjkzMjksImV4cCI6MjA5MDIwNTMyOX0.MmCTr5qceI2iSCBzs2AcLPhn7_aoKfsoWUoKMUwhPhc';
        const { createClient } = supabase;
        const client = createClient(SUPABASE_URL, SUPABASE_KEY);

        let resumeDataGlobal = null;

        // ── Helpers ───────────────────────────────────────────────────────────────
        function escapeHtml(str) {
            if (typeof str !== 'string') return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function showError(title, message) {
            document.getElementById('statusContainer').innerHTML = `
                <div class="status-card">
                    <div class="status-icon">⚠️</div>
                    <h2>${escapeHtml(title)}</h2>
                    <p>${escapeHtml(message)}</p>
                </div>`;
        }

        // ── Page Init ─────────────────────────────────────────────────────────────
        async function initSharePage() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                showError('Invalid Link', 'This share link is missing a token. Please ask the owner for a valid link.');
                return;
            }

            // 1. Fetch the share record
            const { data: share, error: shareErr } = await client
                .from('resume_shares')
                .select('id, resume_id, is_active')
                .eq('share_token', token)
                .eq('is_active', true)
                .maybeSingle();

            if (shareErr || !share) {
                showError('Link Not Found', 'This resume link is invalid, expired, or has been deactivated.');
                return;
            }

            // 2. Fetch the resume
            const { data: resume, error: resumeErr } = await client
                .from('resumes')
                .select('*')
                .eq('id', share.resume_id)
                .maybeSingle();

            if (resumeErr || !resume) {
                showError('Resume Not Found', 'Could not load the resume associated with this link.');
                return;
            }

            resumeDataGlobal = resume;

            // 3. Record the view (fire-and-forget — don't block render)
            client.from('resume_views')
                .insert([{ share_id: share.id, view_count: 1 }])
                .then(({ error }) => { if (error) console.warn('View tracking error:', error); });

            // 4. Render
            renderResume(resume);
        }

        function renderResume(data) {
            const template = data.template_name || 'modern';
            const html = generateResumeHTML(data, template);

            document.getElementById('resumeOwnerName').textContent = data.full_name || 'Unknown';
            document.getElementById('resumeWrapper').innerHTML = html;
            document.getElementById('statusContainer').style.display = 'none';
            document.getElementById('resumeContainer').style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'inline-flex';
        }

        // ── PDF Download ──────────────────────────────────────────────────────────
        async function triggerPDF() {
            if (!resumeDataGlobal) return;
            const btn = document.getElementById('downloadBtn');
            btn.textContent = '⏳ Generating…';
            btn.disabled = true;

            try {
                const template = resumeDataGlobal.template_name || 'modern';
                const html = generateResumeHTML(resumeDataGlobal, template);

                const wrapper = document.createElement('div');
                wrapper.innerHTML = html;
                wrapper.style.position = 'absolute';
                wrapper.style.left = '-9999px';
                document.body.appendChild(wrapper);

                const opt = {
                    margin: [0.45, 0.45, 0.45, 0.45],
                    filename: `${(resumeDataGlobal.full_name || 'resume').replace(/\s+/g, '_')}_resume.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, logging: false },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' },
                };

                await html2pdf().set(opt).from(wrapper).save();
                document.body.removeChild(wrapper);
            } catch (err) {
                console.error('PDF error:', err);
                alert('Failed to generate PDF: ' + err.message);
            } finally {
                btn.textContent = '📥 Download PDF';
                btn.disabled = false;
            }
        }

        // ── Resume Template Renderers ─────────────────────────────────────────────
        function generateResumeHTML(data, template) {
            const exp = data.experience || [];
            const edu = data.education || [];
            const sk  = data.skills || [];
            if (template === 'classic')  return generateClassicTemplate(data, exp, edu, sk);
            if (template === 'creative') return generateCreativeTemplate(data, exp, edu, sk);
            return generateModernTemplate(data, exp, edu, sk);
        }

        function generateModernTemplate(data, exp, edu, sk) {
            const contactParts = [data.email, data.phone, data.location].filter(Boolean).map(escapeHtml).join(' · ');

            const expHTML = exp.map(e => `
                <div style="margin-bottom:14px;">
                    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;">
                        <strong style="font-size:13px;color:#1a1a2e;">${escapeHtml(e.title || '')}</strong>
                        <span style="font-size:11px;color:#64748b;white-space:nowrap;margin-left:8px;">${escapeHtml(e.start || '')}${e.end ? ' – ' + escapeHtml(e.end) : ''}</span>
                    </div>
                    <div style="font-size:12px;color:#7c3aed;margin-bottom:4px;">${escapeHtml(e.company || '')}</div>
                    <div style="font-size:12px;color:#475569;line-height:1.65;">${escapeHtml(e.description || '').replace(/\n/g, '<br>')}</div>
                </div>`).join('');

            const eduHTML = edu.map(e => `
                <div style="margin-bottom:12px;">
                    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;">
                        <strong style="font-size:13px;color:#1a1a2e;">${escapeHtml(e.degree || '')}</strong>
                        <span style="font-size:11px;color:#64748b;margin-left:8px;">${escapeHtml(e.year || '')}</span>
                    </div>
                    <div style="font-size:12px;color:#7c3aed;">${escapeHtml(e.school || '')}${e.grade ? ' · ' + escapeHtml(e.grade) : ''}</div>
                </div>`).join('');

            const skHTML = sk.map(s =>
                `<span style="display:inline-block;background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.3);color:#7c3aed;padding:2px 10px;border-radius:20px;font-size:11px;margin:2px;">${escapeHtml(s)}</span>`
            ).join('');

            const h2Style = 'font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#7c3aed;margin:0 0 10px;padding-left:8px;border-left:3px solid #7c3aed;';

            return `<div style="font-family:'Helvetica Neue',Arial,sans-serif;max-width:760px;margin:0 auto;color:#1a1a2e;background:white;padding:36px;">
                <div style="border-bottom:3px solid #7c3aed;padding-bottom:14px;margin-bottom:18px;">
                    <h1 style="font-size:24px;font-weight:700;margin:0 0 5px;color:#1a1a2e;">${escapeHtml(data.full_name || '')}</h1>
                    <p style="margin:0;color:#7c3aed;font-size:12px;">${contactParts}</p>
                </div>
                ${data.professional_summary ? `<div style="margin-bottom:18px;"><h2 style="${h2Style}">Professional Summary</h2><p style="font-size:12px;color:#475569;line-height:1.7;margin:0;">${escapeHtml(data.professional_summary)}</p></div>` : ''}
                ${exp.length ? `<div style="margin-bottom:18px;"><h2 style="${h2Style}">Work Experience</h2>${expHTML}</div>` : ''}
                ${edu.length ? `<div style="margin-bottom:18px;"><h2 style="${h2Style}">Education</h2>${eduHTML}</div>` : ''}
                ${sk.length  ? `<div style="margin-bottom:18px;"><h2 style="${h2Style}">Skills</h2><div>${skHTML}</div></div>` : ''}
                ${data.certifications ? `<div><h2 style="${h2Style}">Certifications</h2><p style="font-size:12px;color:#475569;line-height:1.7;margin:0;">${escapeHtml(data.certifications).replace(/\n/g,'<br>')}</p></div>` : ''}
            </div>`;
        }

        function generateClassicTemplate(data, exp, edu, sk) {
            const contactParts = [data.email, data.phone, data.location].filter(Boolean).map(escapeHtml).join(' | ');

            const expHTML = exp.map(e => `
                <div style="margin-bottom:14px;">
                    <div style="display:flex;justify-content:space-between;align-items:baseline;">
                        <strong style="font-size:13px;">${escapeHtml(e.title || '')}</strong>
                        <span style="font-size:11px;color:#555;">${escapeHtml(e.start || '')}${e.end ? ' – ' + escapeHtml(e.end) : ''}</span>
                    </div>
                    <div style="font-size:12px;font-style:italic;color:#555;margin-bottom:4px;">${escapeHtml(e.company || '')}</div>
                    <div style="font-size:12px;color:#333;line-height:1.65;">${escapeHtml(e.description || '').replace(/\n/g, '<br>')}</div>
                </div>`).join('');

            const eduHTML = edu.map(e => `
                <div style="margin-bottom:12px;">
                    <div style="display:flex;justify-content:space-between;align-items:baseline;">
                        <strong style="font-size:13px;">${escapeHtml(e.degree || '')}</strong>
                        <span style="font-size:11px;color:#555;">${escapeHtml(e.year || '')}</span>
                    </div>
                    <div style="font-size:12px;font-style:italic;color:#555;">${escapeHtml(e.school || '')}${e.grade ? ' · ' + escapeHtml(e.grade) : ''}</div>
                </div>`).join('');

            const skText = sk.map(escapeHtml).join(', ');
            const h2Style = 'font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#222;margin:0 0 8px;padding-bottom:4px;border-bottom:1px solid #aaa;';

            return `<div style="font-family:Georgia,'Times New Roman',serif;max-width:760px;margin:0 auto;color:#1a1a1a;background:white;padding:40px;">
                <div style="text-align:center;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid #222;">
                    <h1 style="font-size:26px;font-weight:700;margin:0 0 5px;letter-spacing:0.05em;text-transform:uppercase;">${escapeHtml(data.full_name || '')}</h1>
                    <p style="margin:0;color:#444;font-size:12px;">${contactParts}</p>
                </div>
                ${data.professional_summary ? `<div style="margin-bottom:18px;"><h2 style="${h2Style}">Summary</h2><p style="font-size:12px;color:#333;line-height:1.7;margin:0;">${escapeHtml(data.professional_summary)}</p></div>` : ''}
                ${exp.length ? `<div style="margin-bottom:18px;"><h2 style="${h2Style}">Experience</h2>${expHTML}</div>` : ''}
                ${edu.length ? `<div style="margin-bottom:18px;"><h2 style="${h2Style}">Education</h2>${eduHTML}</div>` : ''}
                ${sk.length  ? `<div style="margin-bottom:18px;"><h2 style="${h2Style}">Skills</h2><p style="font-size:12px;color:#333;margin:0;">${skText}</p></div>` : ''}
                ${data.certifications ? `<div><h2 style="${h2Style}">Certifications</h2><p style="font-size:12px;color:#333;line-height:1.7;margin:0;">${escapeHtml(data.certifications).replace(/\n/g,'<br>')}</p></div>` : ''}
            </div>`;
        }

        function generateCreativeTemplate(data, exp, edu, sk) {
            const contactParts = [data.email, data.phone, data.location].filter(Boolean);

            const expHTML = exp.map(e => `
                <div style="margin-bottom:14px;">
                    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;">
                        <strong style="font-size:13px;color:#1a1a2e;">${escapeHtml(e.title || '')}</strong>
                        <span style="font-size:11px;color:#64748b;">${escapeHtml(e.start || '')}${e.end ? ' – ' + escapeHtml(e.end) : ''}</span>
                    </div>
                    <div style="font-size:12px;color:#a855f7;margin-bottom:4px;font-weight:600;">${escapeHtml(e.company || '')}</div>
                    <div style="font-size:12px;color:#475569;line-height:1.65;">${escapeHtml(e.description || '').replace(/\n/g, '<br>')}</div>
                </div>`).join('');

            const eduHTML = edu.map(e => `
                <div style="margin-bottom:12px;">
                    <strong style="font-size:12px;color:#1a1a2e;">${escapeHtml(e.degree || '')}</strong>
                    <div style="font-size:11px;color:#a855f7;">${escapeHtml(e.school || '')}${e.grade ? ' · ' + escapeHtml(e.grade) : ''}${e.year ? ' (' + escapeHtml(e.year) + ')' : ''}</div>
                </div>`).join('');

            const skSidebar = sk.map(s =>
                `<div style="background:rgba(255,255,255,0.12);border-radius:4px;padding:3px 8px;font-size:11px;margin-bottom:4px;">${escapeHtml(s)}</div>`
            ).join('');

            return `<div style="font-family:'Helvetica Neue',Arial,sans-serif;max-width:760px;margin:0 auto;background:white;display:flex;min-height:100%;">
                <div style="width:220px;min-width:220px;background:linear-gradient(160deg,#6d28d9,#a855f7);color:white;padding:28px 18px;">
                    <div style="margin-bottom:24px;">
                        <h1 style="font-size:18px;font-weight:700;margin:0 0 4px;line-height:1.3;">${escapeHtml(data.full_name || '')}</h1>
                    </div>
                    <div style="margin-bottom:20px;">
                        <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.1em;opacity:0.7;margin-bottom:8px;font-weight:700;">Contact</div>
                        ${contactParts.map(c => `<div style="font-size:11px;opacity:0.9;margin-bottom:5px;word-break:break-word;">${escapeHtml(c)}</div>`).join('')}
                    </div>
                    ${sk.length ? `<div style="margin-bottom:20px;"><div style="font-size:9px;text-transform:uppercase;letter-spacing:0.1em;opacity:0.7;margin-bottom:8px;font-weight:700;">Skills</div>${skSidebar}</div>` : ''}
                    ${edu.length ? `<div><div style="font-size:9px;text-transform:uppercase;letter-spacing:0.1em;opacity:0.7;margin-bottom:8px;font-weight:700;">Education</div>${eduHTML}</div>` : ''}
                </div>
                <div style="flex:1;padding:28px 24px;color:#1a1a2e;">
                    ${data.professional_summary ? `<div style="margin-bottom:18px;"><h2 style="font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#a855f7;margin:0 0 8px;font-weight:700;">About Me</h2><p style="font-size:12px;color:#475569;line-height:1.7;margin:0;">${escapeHtml(data.professional_summary)}</p></div>` : ''}
                    ${exp.length ? `<div style="margin-bottom:18px;"><h2 style="font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#a855f7;margin:0 0 12px;font-weight:700;">Experience</h2>${expHTML}</div>` : ''}
                    ${data.certifications ? `<div><h2 style="font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#a855f7;margin:0 0 8px;font-weight:700;">Certifications</h2><p style="font-size:12px;color:#475569;line-height:1.7;margin:0;">${escapeHtml(data.certifications).replace(/\n/g,'<br>')}</p></div>` : ''}
                </div>
            </div>`;
        }

        // ── Bootstrap ─────────────────────────────────────────────────────────────
        window.addEventListener('load', initSharePage);
    </script>
</body>
</html>
