<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Resume - CareerCraft AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app-sdk.js"></script>
    <script src="resume-renderer.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Content wrapper */
        .page-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.5s ease forwards;
        }

        /* Loading / error states */
        .status-card {
            background: var(--bg-card);
            border: 1px solid var(--border-md);
            border-radius: var(--r-xl);
            padding: 3rem 2rem;
            text-align: center;
            margin-top: 2rem;
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow-card);
        }

        .status-icon { font-size: 3rem; margin-bottom: 1rem; }
        .status-card h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.75rem; color: var(--text-1); font-family: 'Outfit', sans-serif; }
        .status-card p { color: var(--text-2); line-height: 1.6; }

        /* Resume wrapper */
        #resumeWrapper {
            background: white;
            border-radius: var(--r-md);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            margin-top: 1.5rem;
        }

        /* Meta bar above resume */
        .resume-meta-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            flex-wrap: wrap;
            gap: 0.75rem;
            padding: 1.25rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border-md);
            border-radius: var(--r-lg);
            backdrop-filter: blur(12px);
        }

        .meta-info { color: var(--text-2); font-size: 0.9rem; font-weight: 500; }
        .meta-info strong { color: var(--text-1); font-weight: 700; }
    </style>
    <link rel="stylesheet" href="styles/premium.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>



    <!-- Top Bar -->
    <nav class="topnav">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            CareerCraft AI
        </div>
        <div class="nav-links">
            <button class="btn-primary" id="downloadBtn" onclick="triggerPDF()" style="display:none; margin-right: 1rem;">📥 Download PDF</button>
            <a href="index.html" class="nav-btn">🏠 Home</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="page-content">
        <div id="statusContainer">
            <div class="status-card">
                <div class="status-icon">⏳</div>
                <h2>Loading Resume…</h2>
                <p>Fetching resume data, please wait.</p>
            </div>
        </div>

        <div id="resumeContainer" style="display:none;">
            <div class="resume-meta-bar">
                <div class="meta-info">
                    Viewing resume of <strong id="resumeOwnerName"></strong>
                </div>
            </div>
            <div id="resumeWrapper"></div>
        </div>
    </div>

    <script>
        // ── Supabase Setup ────────────────────────────────────────────────────────
        let client = null;

        let resumeDataGlobal = null;

        // ── Helpers ───────────────────────────────────────────────────────────────
        function escapeHtml(str) {
            if (typeof str !== 'string') return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function showError(title, message) {
            document.getElementById('statusContainer').innerHTML = `
                <div class="status-card">
                    <div class="status-icon">⚠️</div>
                    <h2>${escapeHtml(title)}</h2>
                    <p>${escapeHtml(message)}</p>
                </div>`;
        }

        // ── Page Init ─────────────────────────────────────────────────────────────
        async function initSharePage() {
            await window.appSdk.ready;
            client = window.appSdk.client;

            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                showError('Invalid Link', 'This share link is missing a token. Please ask the owner for a valid link.');
                return;
            }

            // 1. Fetch the share record
            const { data: share, error: shareErr } = await client
                .from('resume_shares')
                .select('id, resume_id, is_active')
                .eq('share_token', token)
                .eq('is_active', true)
                .maybeSingle();

            if (shareErr || !share) {
                showError('Link Not Found', 'This resume link is invalid, expired, or has been deactivated.');
                return;
            }

            // 2. Fetch the resume
            const { data: resume, error: resumeErr } = await client
                .from('resumes')
                .select('*')
                .eq('id', share.resume_id)
                .maybeSingle();

            if (resumeErr || !resume) {
                showError('Resume Not Found', 'Could not load the resume associated with this link.');
                return;
            }

            resumeDataGlobal = resume;

            // 3. Record the view (fire-and-forget — don't block render)
            client.from('resume_views')
                .insert([{ share_id: share.id, view_count: 1 }])
                .then(({ error }) => { if (error) console.warn('View tracking error:', error); });

            // 4. Render
            renderResume(resume);
        }

        function renderResume(data) {
            const template = data.template_name || 'modern';
            const html = window.ResumeRenderer.render(data, template);

            document.getElementById('resumeOwnerName').textContent = data.full_name || 'Unknown';
            document.getElementById('resumeWrapper').innerHTML = html;
            document.getElementById('statusContainer').style.display = 'none';
            document.getElementById('resumeContainer').style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'inline-flex';
        }

        // ── PDF Download ──────────────────────────────────────────────────────────
        async function triggerPDF() {
            if (!resumeDataGlobal) return;
            const btn = document.getElementById('downloadBtn');
            btn.textContent = '⏳ Generating…';
            btn.disabled = true;

            try {
                const template = resumeDataGlobal.template_name || 'modern';
                const html = window.ResumeRenderer.render(resumeDataGlobal, template);

                const wrapper = document.createElement('div');
                wrapper.innerHTML = html;
                wrapper.style.position = 'absolute';
                wrapper.style.left = '-9999px';
                document.body.appendChild(wrapper);

                const opt = {
                    margin: [0.45, 0.45, 0.45, 0.45],
                    filename: `${(resumeDataGlobal.full_name || 'resume').replace(/\s+/g, '_')}_resume.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, logging: false },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' },
                };

                await html2pdf().set(opt).from(wrapper).save();
                document.body.removeChild(wrapper);
            } catch (err) {
                console.error('PDF error:', err);
                alert('Failed to generate PDF: ' + err.message);
            } finally {
                btn.textContent = '📥 Download PDF';
                btn.disabled = false;
            }
        }

        // ── Bootstrap ─────────────────────────────────────────────────────────────
        window.addEventListener('load', initSharePage);
    </script>
</body>
</html>
