<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - CareerCraft AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles/premium.css">
</head>
<body>
    <div class="glow-circle glow-1"></div>
    <div class="glow-circle glow-2"></div>

    <div class="topnav">
        <a href="dashboard.html" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            CareerCraft AI
        </a>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-btn">← Dashboard</a>
            <button class="nav-btn" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <div class="container">
        <h1 class="page-title">⚙️ Account Settings</h1>

        <!-- Profile Information -->
        <div class="glass-card mb-1">
            <h2 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border-color);">👤 Profile Information</h2>
            <div id="profileError" class="alert error" style="padding: 0.85rem 1rem; border-radius: 0.5rem; margin-bottom: 1rem; display: none; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5;"></div>
            <div id="profileSuccess" class="alert success" style="padding: 0.85rem 1rem; border-radius: 0.5rem; margin-bottom: 1rem; display: none; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #6ee7b7;"></div>
            <form onsubmit="updateProfile(event)">
                <div class="form-group mb-1">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Your full name" required>
                </div>
                <div class="form-group mb-1">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="your@email.com" readonly style="opacity:0.7">
                </div>
                <button type="submit" class="btn-primary mt-1" id="profileBtn">Save Changes</button>
            </form>
        </div>

        <!-- Account Info -->
        <div class="glass-card mb-1">
            <h2 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border-color);">ℹ️ Account Info</h2>
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid var(--border-color); font-size: 0.9rem;">
                <span style="color: var(--text-secondary);">User ID</span>
                <span style="font-weight: 500;" id="userId">—</span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid var(--border-color); font-size: 0.9rem;">
                <span style="color: var(--text-secondary);">Account Created</span>
                <span style="font-weight: 500;" id="createdAt">—</span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; font-size: 0.9rem;">
                <span style="color: var(--text-secondary);">Last Sign In</span>
                <span style="font-weight: 500;" id="lastSignIn">—</span>
            </div>
        </div>

        <!-- Change Password -->
        <div class="glass-card mb-1">
            <h2 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border-color);">🔐 Change Password</h2>
            <div id="pwError" class="alert error" style="padding: 0.85rem 1rem; border-radius: 0.5rem; margin-bottom: 1rem; display: none; background: #fee2e2; color: #991b1b;"></div>
            <div id="pwSuccess" class="alert success" style="padding: 0.85rem 1rem; border-radius: 0.5rem; margin-bottom: 1rem; display: none; background: #dcfce7; color: #166534;"></div>
            <form onsubmit="changePassword(event)">
                <div class="form-group mb-1">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="At least 8 characters" required minlength="8">
                </div>
                <div class="form-group mb-1">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat new password" required minlength="8">
                </div>
                <button type="submit" class="btn-primary mt-1" id="pwBtn">Update Password</button>
            </form>
        </div>

        <!-- Danger Zone -->
        <div class="glass-card" style="border-color: rgba(239, 68, 68, 0.4);">
            <h2 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444;">⚠️ Danger Zone</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.25rem; line-height: 1.5;">
                Deleting your account is permanent. All your resumes, settings, and data will be removed and cannot be recovered.
            </p>
            <button type="button" class="btn-primary" style="background: transparent; border: 1px solid rgba(239, 68, 68, 0.5); color: #ef4444;" onclick="confirmDeleteAccount()" id="deleteBtn">Delete Account</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const SUPABASE_URL = 'https://eduogxolvpqdtvtdiqav.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdW9neG9sdnBxZHR2dGRpcWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjkzMjksImV4cCI6MjA5MDIwNTMyOX0.MmCTr5qceI2iSCBzs2AcLPhn7_aoKfsoWUoKMUwhPhc';

        const { createClient } = supabase;
        const client = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3500);
        }

        function showAlert(id, message, type) {
            const el = document.getElementById(id);
            el.textContent = message;
            el.className = `alert ${type}`;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '—';
            return new Date(dateStr).toLocaleDateString('en-US', {
                year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        async function loadUserInfo() {
            try {
                const { data: { session } } = await client.auth.getSession();

                if (!session) {
                    window.location.href = 'login.html';
                    return;
                }

                currentUser = session.user;

                document.getElementById('fullName').value = currentUser.user_metadata?.full_name || '';
                document.getElementById('email').value = currentUser.email || '';
                document.getElementById('userId').textContent = currentUser.id;
                document.getElementById('createdAt').textContent = formatDate(currentUser.created_at);
                document.getElementById('lastSignIn').textContent = formatDate(currentUser.last_sign_in_at);
            } catch (error) {
                console.error('Load user info error:', error);
                showToast('❌ Failed to load user info', 'error');
            }
        }

        async function updateProfile(event) {
            event.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const btn = document.getElementById('profileBtn');

            if (!fullName) {
                showAlert('profileError', '❌ Full name cannot be empty.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                const { error } = await client.auth.updateUser({
                    data: { full_name: fullName }
                });

                if (error) throw new Error(error.message);

                localStorage.setItem('userName', fullName);
                if (currentUser && currentUser.user_metadata) {
                    currentUser.user_metadata.full_name = fullName;
                }
                showAlert('profileSuccess', '✅ Profile updated successfully!', 'success');
                showToast('✅ Profile saved!');
            } catch (error) {
                showAlert('profileError', `❌ ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Changes';
            }
        }

        async function changePassword(event) {
            event.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('pwBtn');

            if (newPassword !== confirmPassword) {
                showAlert('pwError', '❌ Passwords do not match.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                const { error } = await client.auth.updateUser({ password: newPassword });

                if (error) throw new Error(error.message);

                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                showAlert('pwSuccess', '✅ Password changed successfully!', 'success');
                showToast('✅ Password updated!');
            } catch (error) {
                showAlert('pwError', `❌ ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Update Password';
            }
        }

      async function confirmDeleteAccount() {
    const confirmed = confirm(
        '⚠️ Are you absolutely sure?\n\nThis will permanently delete your account and ALL your data. This action CANNOT be undone.'
    );
    if (!confirmed) return;

    const btn = document.getElementById('deleteBtn');
    btn.disabled = true;
    btn.textContent = 'Deleting permanently...';

    try {
        if (!currentUser?.id) {
            throw new Error('User not found');
        }

        const response = await fetch('/api/delete-user', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentUser.id })
        });

        const text = await response.text();
        let data = {};
        try {
            data = text ? JSON.parse(text) : {};
        } catch (_err) {
            data = { error: text || 'Failed to delete account' };
        }

        if (!response.ok) {
            throw new Error(data.error || 'Failed to delete account');
        }

        await client.auth.signOut();
        localStorage.clear();

        showToast('✅ Account permanently deleted! Redirecting...', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 2000);

    } catch (error) {
        console.error('Delete account error:', error);
        showToast(`❌ ${error.message}`, 'error');
        btn.disabled = false;
        btn.textContent = 'Delete Account';
    }
}

        async function logout() {
            try {
                await client.auth.signOut();
                localStorage.removeItem('userEmail');
                localStorage.removeItem('userName');
                localStorage.removeItem('userId');
                localStorage.removeItem('userToken');
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Logout error:', error);
                window.location.href = 'index.html';
            }
        }

        // Load user info on page load
        window.addEventListener('load', loadUserInfo);
    </script>
<script src="ambient3d.js"></script>
</body>
</html>
