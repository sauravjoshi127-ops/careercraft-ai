<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerCraft AI Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e27; color: #f1f5f9; font-family: Arial, sans-serif; }
        nav { background: #1a1f3a; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { color: #cbd5e1; text-decoration: none; }
        .nav-links a:hover { color: #7c3aed; }
        .btn { background: linear-gradient(135deg, #7c3aed, #a855f7); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; cursor: pointer; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124, 58, 237, 0.3); }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; padding: 3rem 2rem; max-width: 1400px; margin: 0 auto; }
        .panel { background: rgba(20, 24, 41, 0.6); border: 1px solid rgba(148, 163, 184, 0.1); border-radius: 1rem; padding: 2rem; backdrop-filter: blur(10px); }
        .panel h2 { margin-bottom: 1.5rem; }
        textarea { width: 100%; height: 250px; background: rgba(10, 14, 39, 0.8); border: 1px solid rgba(148, 163, 184, 0.15); border-radius: 0.5rem; padding: 1rem; color: #f1f5f9; margin: 1rem 0; }
        textarea:focus { outline: none; border-color: rgba(124, 58, 237, 0.5); }
        .preview-box { min-height: 300px; background: #faf8ff; border-radius: 0.5rem; padding: 1.5rem; color: #1a1a1a; }
        footer { background: #1a1f3a; padding: 2rem; text-align: center; color: #cbd5e1; margin-top: 3rem; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">🚀 CareerCraft AI</div>
        <div class="nav-links">
            <a href="#">Dashboard</a>
            <a href="#">Resume Builder</a>
            <a href="#">Pricing</a>
        </div>
        <button class="btn">Get Started</button>
    </nav>

    <div class="container">
        <div class="panel">
            <h2>✏️ Editor</h2>
            <p>Write your resume here</p>
            <textarea placeholder="Your content..."></textarea>
        </div>
        <div class="panel">
            <h2>👁️ Preview</h2>
            <div class="preview-box">Your resume preview will appear here</div>
        </div>
    </div>

    <div class="container">
        <div class="panel">
            <h2>🤖 AI Assistant</h2>
            <p>Get AI suggestions</p>
            <textarea placeholder="Ask AI..."></textarea>
        </div>
        <div class="panel">
            <h2>📊 Stats</h2>
            <p>Track your progress</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 CareerCraft AI</p>
    </footer>
</body>
</html>
