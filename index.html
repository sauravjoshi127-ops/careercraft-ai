<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Dark-Themed Dashboard</title>
    <link rel="stylesheet" href="styles.css">  
</head>
<body>
    <div class="container">
        <div class="editor-panel">
            <h2>Editor</h2>
            <textarea id="editor" placeholder="Write your content here..."></textarea>
        </div>
        <div class="preview-panel">
            <h2>Preview</h2>
            <div id="preview"></div>
        </div>
        <div class="ai-assistant-panel">
            <h2>AI Assistant</h2>
            <div id="ai-assistant">
                <p>How can I assist you today?</p>
                <textarea id="assistant-input" placeholder="Ask your question..."></textarea>
                <button id="ai-send">Send</button>
            </div>
        </div>
        <div class="resume-preview-panel">
            <h2>Resume Preview</h2>
            <div id="resume-preview">
                <p>Your resume will be displayed here.</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
